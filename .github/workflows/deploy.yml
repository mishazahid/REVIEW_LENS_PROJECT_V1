name: Build and Deploy ReviewLens

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build React frontend
        working-directory: frontend
        run: |
          rm -rf node_modules package-lock.json
          npm install
          npm run build

      - name: Prepare deployment package
        run: |
          mkdir deploy

          # Copy backend code
          cp -r backend/app deploy/app
          cp backend/requirements.txt deploy/requirements.txt
          cp backend/data/sample_reviews.csv deploy/sample_reviews.csv

          # Copy frontend build
          cp -r frontend/dist deploy/static

          # Create startup script that installs deps at runtime
          cat > deploy/startup.sh << 'SHELLEOF'
          #!/bin/bash
          echo "=== ReviewLens Startup ==="
          cd /home/site/wwwroot
          pip install -r requirements.txt 2>&1 | tail -5
          python -m gunicorn app.main:app --workers 1 --worker-class uvicorn.workers.UvicornWorker --bind 0.0.0.0:8000 --timeout 120
          SHELLEOF
          sed -i 's/^          //' deploy/startup.sh
          chmod +x deploy/startup.sh

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_APP_NAME }}
          publish-profile: ${{ secrets.AZURE_PUBLISH_PROFILE }}
          package: deploy
