name: Build and Deploy ReviewLens

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build React frontend
        working-directory: frontend
        run: |
          rm -rf node_modules package-lock.json
          npm install
          npm run build

      - name: Prepare deployment package
        run: |
          mkdir -p deploy/app
          mkdir -p deploy/static

          # Copy backend
          cp -r backend/app/* deploy/app/
          cp backend/requirements.txt deploy/requirements.txt
          cp backend/data/sample_reviews.csv deploy/sample_reviews.csv

          # Copy frontend build
          cp -r frontend/dist deploy/static/

          # Create the main entry point at root level
          cat > deploy/main.py << 'PYEOF'
          import os
          import sys
          sys.path.insert(0, os.path.dirname(__file__))
          os.environ.setdefault("SAMPLE_DATA_PATH", os.path.join(os.path.dirname(__file__), "sample_reviews.csv"))
          os.environ.setdefault("STATIC_DIR", os.path.join(os.path.dirname(__file__), "static"))
          from app.main import app
          PYEOF

          # Remove leading spaces from heredoc
          sed -i 's/^          //' deploy/main.py

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_APP_NAME }}
          publish-profile: ${{ secrets.AZURE_PUBLISH_PROFILE }}
          package: deploy
